<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bharani Kumar Velakaturi</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f8fafc;
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    p {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-top: 10px;
    }

    /* Each letter of "Bharani" gets its own color */
    .name span {
      display: inline-block;
    }
    .name span:nth-child(1) { color: #f87171; } /* B - red */
    .name span:nth-child(2) { color: #fb923c; } /* h - orange */
    .name span:nth-child(3) { color: #facc15; } /* a - yellow */
    .name span:nth-child(4) { color: #4ade80; } /* r - green */
    .name span:nth-child(5) { color: #22d3ee; } /* a - cyan */
    .name span:nth-child(6) { color: #60a5fa; } /* n - blue */
    .name span:nth-child(7) { color: #c084fc; } /* i - purple */
  </style>
</head>
<body>
  <div>
    <h1>Welcome to <span class="name"><span>B</span><span>h</span><span>a</span><span>r</span><span>a</span><span>n</span><span>i</span></span> Kumar's Space</h1>
    <p>Site under construction — more coming soon.</p>
  </div>
</body>
</html>
